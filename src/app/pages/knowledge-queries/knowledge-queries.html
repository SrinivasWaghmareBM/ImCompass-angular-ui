<div class="knowledge-queries-page">
  <div class="page-header">
    <h2 class="page-heading">Knowledge & Queries</h2>
    <p class="page-subtitle">Ask questions across your enterprise knowledge base and get grounded answers with citations</p>
  </div>

  <!-- Search Section -->
  <div class="search-section">
    <div class="search-input-row">
      <div class="search-input-wrapper">
        <input 
          type="text" 
          [value]="searchQuery()" 
          (input)="searchQuery.set($any($event.target).value)"
          (keyup.enter)="performSearch()" 
          placeholder="What is the answer you're looking for?" 
          class="search-input">
      </div>
      <button (click)="performSearch()" class="search-btn"> <i class="nav-icon fa-brands fa-searchengin"></i>  Search</button>
    </div>

    <!-- Search + Filters -->
  <div class="search-filter-bar">
    <div class="filters">
      <select 
        [value]="selectedDocType()" 
        (change)="onDocTypeFilterChange($any($event.target).value)"
        class="filter-select">
        <option value="all">All Types</option>
        <option value="Policies">Policies</option>
        <option value="Procedures">Procedures</option>
      </select>
      
      <select 
      [value]="selectedDomain()" 
      (change)="onDomainFilterChange($any($event.target).value)"
        class="filter-select">
        <option value="all">All Domains</option>
        <option value="Risk">Risk & Compliance</option>
        <option value="Operations">Operations</option>
        <option value="UKIM">UKIM</option>
        <option value="People">People</option>
      </select>

      
      <select 
      [value]="selectedDateLastUpdated()" 
      (change)="onDateLastUpdatedFilterChange($any($event.target).value)"
        class="filter-select">
        <option value="all">Date Last Updated</option>
        <option value="30">Past 30 Days</option>
        <option value="60">Past 60 Days</option>
        <option value="90">Past 90 Days</option>
        <option value="365">Past year</option>
      </select>

      <!-- Clear Filters Button -->
      <button 
        class="clear-filters-btn"
        (click)="clearAllFilters()"
        [disabled]="!hasActiveFilters()">
        Clear Filters
      </button>
    </div>
  </div>

  </div>

  <!-- Empty State -->
  @if (!hasSearched()) {
    <div class="empty-state">
      <div class="empty-icon"> <i class="nav-icon fa-brands fa-searchengin"></i></div>
      <div class="empty-title">No query entered</div>
      <div class="empty-subtitle">Enter a question above to search policies and procedures</div>
    </div>
  }

  <!-- Results -->
  @if (hasSearched() && hasResults()) {
    <div class="results-wrapper">
      
      <!-- Answer + Citations -->
      <div class="top-row">
        
        <!-- Smart Answer Card (with rating + feedback) -->
        <app-answer-card 
          [answer]="currentAnswer()?.text || ''" 
          [confidence]="confidenceScore()"
          (ratingSubmitted)="onRatingSubmitted($event)"
          (copyClicked)="copyAnswer()">
        </app-answer-card>

        <!-- Citations Card -->
        <app-citations-card [citations]="currentAnswer()?.citations ?? []"></app-citations-card>
      </div>

      <!-- Suggested Follow-ups + Next Actions -->
      <div class="bottom-row">
        <app-followup-card 
          [followups]="suggestedFollowUpsList()" 
          (selected)="onFollowupSelected($event)">
        </app-followup-card>

        <app-next-actions-card [actions]="currentAnswer()?.nextSteps ?? []"></app-next-actions-card>
      </div>
    </div>
  }
</div>
