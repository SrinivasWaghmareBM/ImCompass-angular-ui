<div class="change-impact-page">
  <!-- Header -->
  <div class="page-header">
    <h1 class="page-heading">Change Impact</h1>
    <p class="page-subtitle">Review recent policy and procedure updates with highlighted changes</p>
  </div>

  <!-- Search + Filters -->
  <div class="search-filter-bar">
    <div class="search-input-wrapper">
      <input 
        type="text" 
        [value]="searchQuery()" 
        (input)="searchQuery.set($any($event.target).value); onSearchChange()"
        placeholder="Search changes..." 
        class="search-input">
    </div>

    <div class="filters">

      <select 
        [value]="selectedDomainFilter()" 
        (change)="onDomainFilterChange($any($event.target).value)"
        class="filter-select">
        <option value="All">All Domains</option>
        <option value="Risk">Risk & Compliance</option>
        <option value="Operations">Operations</option>
        <option value="UKIM">UKIM</option>
        <option value="People">People</option>
      </select>
      
      <select 
        [value]="selectedTimeFilter()" 
        (change)="onTimeFilterChange($any($event.target).value)"
        class="filter-select">
        <option value="all">Date Last Updated</option>
        <option value="30">Past 30 Days</option>
        <option value="60">Past 60 Days</option>
        <option value="90">Past 90 Days</option>
        <option value="365">Past year</option>
      </select>

      <!-- Clear Filters Button -->
      <button 
        class="clear-filters-btn"
        (click)="clearFilters()"
        [disabled]="!hasActiveFilters()">
        Clear Filters
      </button>
    </div>
  </div>

  <!-- Policy Cards -->
  <div class="policy-list">
    @for (policy of filteredPolicies(); track policy.id) {
      <app-policy-card
        [policy]="policy"
        [isExpanded]="isExpanded(policy.id)"
        [attestedAt]="getAttestedAt(policy.id)"
        (toggle)="togglePolicy(policy.id)"
        (viewFullPolicy)="onViewFullPolicy($event)"
        (downloadSummary)="onDownloadSummary($event)"
        (attest)="onAttest($event)">
      </app-policy-card>
    }

    @if (filteredPolicies().length === 0) {
      <div class="no-results">
        No policy changes found matching your criteria.
      </div>
    }
  </div>
</div>
